<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses - Internal Assessment Marks</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .courses-wrapper { min-height:100vh;background:#f0f4ff;padding:30px 20px; }
        .courses-header { max-width:900px;margin:0 auto 30px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px; }
        .courses-header h1 { font-size:1.7rem;color:#2d3a5c;margin:0; }
        .teacher-badge { background:#667eea;color:white;padding:6px 14px;border-radius:20px;font-size:.85rem;font-weight:600; }
        .courses-grid { max-width:900px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px; }
        .course-card { background:white;border-radius:14px;box-shadow:0 4px 18px rgba(0,0,0,.08);padding:24px;cursor:pointer;transition:transform .2s,box-shadow .2s;border:2px solid transparent; }
        .course-card:hover { transform:translateY(-4px);box-shadow:0 10px 30px rgba(102,126,234,.18);border-color:#667eea; }
        .course-card-icon { font-size:2rem;margin-bottom:12px; }
        .course-card h3 { font-size:1.05rem;color:#2d3a5c;margin:0 0 6px; }
        .course-card .meta { font-size:.82rem;color:#7a8a9e;margin-bottom:4px; }
        .course-card .badge-row { display:flex;gap:8px;flex-wrap:wrap;margin-top:14px; }
        .badge { background:#eef2ff;color:#667eea;padding:3px 10px;border-radius:12px;font-size:.77rem;font-weight:600; }
        .add-course-card { background:white;border:2px dashed #ccd6ff;border-radius:14px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;min-height:160px; }
        .add-course-card:hover { border-color:#667eea;background:#f5f7ff; }
        .add-course-card .plus { font-size:2.5rem;color:#667eea;margin-bottom:10px; }
        .add-course-card p { color:#7a8a9e;font-size:.9rem;margin:0; }
        .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center; }
        .modal-overlay.show { display:flex; }
        .modal-box { background:white;border-radius:16px;padding:32px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:slideIn .3s ease-out; }
        @keyframes slideIn { from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)} }
        .modal-box h2 { margin:0 0 22px;color:#2d3a5c;font-size:1.3rem; }
        .modal-box .form-group { margin-bottom:16px; }
        .modal-box .form-label { display:block;margin-bottom:6px;font-weight:500;color:#444;font-size:.9rem; }
        .modal-box .form-control { width:100%;padding:10px 13px;border:2px solid #e0e0e0;border-radius:9px;font-size:14px;box-sizing:border-box;transition:border-color .2s; }
        .modal-box .form-control:focus { outline:none;border-color:#667eea; }
        .modal-footer { display:flex;gap:10px;margin-top:20px;justify-content:flex-end; }
        .logout-btn { background:none;border:1px solid rgba(255,255,255,.5);color:white;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.85rem; }
        .top-bar { background:linear-gradient(135deg,#667eea,#764ba2);padding:14px 30px;display:flex;align-items:center;justify-content:space-between;color:white; }
        .top-bar h2 { margin:0;font-size:1.1rem; }
        .no-courses { max-width:900px;margin:60px auto;text-align:center;color:#7a8a9e; }
        .no-courses .icon { font-size:3rem;margin-bottom:16px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <h2>📚 Internal Assessment Marks</h2>
        <div style="display:flex;align-items:center;gap:14px;">
            <span id="teacherName" style="font-size:.9rem;opacity:.9;"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="courses-wrapper">
        <div class="courses-header">
            <div>
                <h1>My Courses</h1>
                <p style="margin:4px 0 0;color:#7a8a9e;font-size:.9rem;">Select a course to manage marks, or create a new one</p>
            </div>
        </div>

        <div class="courses-grid" id="coursesGrid">
            <!-- populated by JS -->
        </div>
    </div>

    <!-- Create Course Modal -->
    <div class="modal-overlay" id="createModal">
        <div class="modal-box">
            <h2>➕ Create New Course</h2>
            <div class="form-group">
                <label class="form-label">Course Name *</label>
                <input type="text" class="form-control" id="newCourseName" placeholder="e.g. Data Structures">
            </div>
            <div class="form-group">
                <label class="form-label">Subject Code *</label>
                <input type="text" class="form-control" id="newSubjectCode" placeholder="e.g. CS301">
            </div>
            <div class="form-group">
                <label class="form-label">Department *</label>
                <input type="text" class="form-control" id="newDepartment" placeholder="e.g. CSE">
            </div>
            <div class="form-group">
                <label class="form-label">Semester *</label>
                <input type="text" class="form-control" id="newSemester" placeholder="e.g. 3">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="createCourse()">Create Course</button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>
    <div id="loading" class="loading-overlay"><div class="spinner"></div></div>

    <script src="js/api.js"></script>
    <script>
        async function checkAuth() {
            const result = await api.get('/auth/check');
            if (!result.authenticated) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('teacherName').textContent = result.name || result.teacher_id;
            }
        }

        async function logout() {
            await api.post('/auth/logout', {});
            window.location.href = 'login.html';
        }

        async function loadCourses() {
            showLoading();
            const result = await api.get('/courses/');
            hideLoading();
            const grid = document.getElementById('coursesGrid');

            let html = '';
            if (result.success && result.data.length > 0) {
                result.data.forEach(course => {
                    html += `
                    <div class="course-card" onclick="selectCourse(${course.id}, '${escHtml(course.course_name)}')">
                        <div class="course-card-icon">📖</div>
                        <h3>${escHtml(course.course_name)}</h3>
                        <div class="meta">📋 ${escHtml(course.subject_code)}</div>
                        <div class="meta">🏫 ${escHtml(course.department)}</div>
                        <div class="badge-row">
                            <span class="badge">Sem ${escHtml(course.semester)}</span>
                        </div>
                    </div>`;
                });
            }

            html += `
            <div class="add-course-card" onclick="openModal()">
                <div class="plus">+</div>
                <p>Create New Course</p>
            </div>`;

            grid.innerHTML = html;
        }

        function escHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function selectCourse(courseId, courseName) {
            localStorage.setItem('selectedCourseId', courseId);
            localStorage.setItem('selectedCourseName', courseName);
            window.location.href = 'dashboard.html';
        }

        function openModal() {
            document.getElementById('createModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('createModal').classList.remove('show');
            document.getElementById('newCourseName').value = '';
            document.getElementById('newSubjectCode').value = '';
            document.getElementById('newDepartment').value = '';
            document.getElementById('newSemester').value = '';
        }

        async function createCourse() {
            const course_name = document.getElementById('newCourseName').value.trim();
            const subject_code = document.getElementById('newSubjectCode').value.trim();
            const department = document.getElementById('newDepartment').value.trim();
            const semester = document.getElementById('newSemester').value.trim();

            if (!course_name || !subject_code || !department || !semester) {
                showNotification('Please fill all fields', 'error');
                return;
            }

            showLoading();
            const result = await api.post('/courses/', { course_name, subject_code, department, semester });
            hideLoading();

            if (result.success) {
                showNotification('Course created!', 'success');
                closeModal();
                loadCourses();
            } else {
                showNotification(result.message || 'Failed to create course', 'error');
            }
        }

        checkAuth();
        loadCourses();
    </script>
</body>
</html>
